version: "3"

services:

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama

  backend:
    build: .
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    environment:
      - OLLAMA_URL=http://ollama:11434
    ports:
      - "8000:8000"
    depends_on:
      - ollama

  frontend:
    build: .
    command: npm run dev
    ports:
      - "3000:3000"

volumes:
  ollama:
