version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:7860

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "7860:7860"
    environment:
      - HF_MODEL_ID=google/flan-t5-small
      - MODELS_DIR=/models
      - VERCEL_APP_ORIGIN=https://yt-video-explainer.vercel.app
    volumes:
      - ./models:/models